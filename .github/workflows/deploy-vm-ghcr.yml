name: Build and deploy Gobrewery

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      operation:
        description: Reuse a proven OCI release through the common deployment path
        required: true
        default: redeploy
        type: choice
        options:
          - redeploy
          - recovery
          - failure-drill
          - rollback-failure-drill
      sha:
        description: Full 40-character commit SHA of a previously published release
        required: true
        type: string
  repository_dispatch:
    types:
      - vercel.deployment.success

concurrency:
  group: ${{ github.event_name == 'repository_dispatch' && 'gobrewery-vercel' || 'gobrewery-oci' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/gobrewery-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/gobrewery-web

jobs:
  classify:
    name: Classify OCI release
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      executable: ${{ steps.classify.outputs.executable }}
      manual: ${{ steps.classify.outputs.manual }}
      target_sha: ${{ steps.classify.outputs.target_sha }}
      operation: ${{ steps.classify.outputs.operation }}
      failure_mode: ${{ steps.classify.outputs.failure_mode }}
    steps:
      - name: Check out delivery contract
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths or manual operation
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          REQUESTED_SHA: ${{ inputs.sha }}
          REQUESTED_OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" = workflow_dispatch ]]; then
            case "$REQUESTED_SHA" in *[!0-9a-f]*|'') echo 'Invalid release SHA' >&2; exit 64;; esac
            [[ "${#REQUESTED_SHA}" -eq 40 ]] || { echo 'Invalid release SHA' >&2; exit 64; }
            git cat-file -e "$REQUESTED_SHA^{commit}"
            git merge-base --is-ancestor "$REQUESTED_SHA" origin/master
            case "$REQUESTED_OPERATION" in
              redeploy) operation=redeploy; failure_mode=none ;;
              recovery) operation=recovery; failure_mode=none ;;
              failure-drill) operation=redeploy; failure_mode=promotion ;;
              rollback-failure-drill) operation=recovery; failure_mode=rollback ;;
              *) echo 'Invalid manual operation' >&2; exit 64 ;;
            esac
            executable=false
            manual=true
            target_sha="$REQUESTED_SHA"
          else
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" = 0000000000000000000000000000000000000000 ]]; then
              git ls-tree --recursive --name-only "$GITHUB_SHA" >"$RUNNER_TEMP/changed-paths"
            else
              git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" >"$RUNNER_TEMP/changed-paths"
            fi
            executable="$(deploy/classify-release.sh <"$RUNNER_TEMP/changed-paths")"
            manual=false
            target_sha="$GITHUB_SHA"
            operation=deploy
            failure_mode=none
          fi
          {
            printf 'executable=%s\n' "$executable"
            printf 'manual=%s\n' "$manual"
            printf 'target_sha=%s\n' "$target_sha"
            printf 'operation=%s\n' "$operation"
            printf 'failure_mode=%s\n' "$failure_mode"
          } >>"$GITHUB_OUTPUT"

  verify:
    name: Verify candidate
    needs: classify
    if: needs.classify.outputs.executable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.classify.outputs.target_sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Verify API
        working-directory: server
        run: |
          yarn install --frozen-lockfile --network-timeout 600000
          yarn build

      - name: Verify web
        working-directory: web
        env:
          CI: "true"
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: /api
        run: |
          yarn install --frozen-lockfile --network-timeout 600000
          yarn build

      - name: Verify deployment contracts
        run: |
          bash deploy/tests/release-contract.sh
          node deploy/tests/compose-contract.mjs

  publish:
    name: Publish immutable ARM64 images
    needs: [classify, verify]
    if: needs.classify.outputs.executable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.classify.outputs.target_sha }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable API image
        id: api
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./deploy/Dockerfile.api
          push: true
          platforms: linux/arm64
          tags: ${{ env.API_IMAGE }}:sha-${{ needs.classify.outputs.target_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.classify.outputs.target_sha }}
          cache-from: type=gha,scope=gobrewery-api
          cache-to: type=gha,mode=max,scope=gobrewery-api

      - name: Publish immutable web image
        id: web
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./deploy/Dockerfile.web
          push: true
          platforms: linux/arm64
          build-args: REACT_APP_API_URL=/api
          tags: ${{ env.WEB_IMAGE }}:sha-${{ needs.classify.outputs.target_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.classify.outputs.target_sha }}
          cache-from: type=gha,scope=gobrewery-web
          cache-to: type=gha,mode=max,scope=gobrewery-web

      - name: Build permission-preserving release package
        env:
          TARGET_SHA: ${{ needs.classify.outputs.target_sha }}
          API_REFERENCE: ${{ env.API_IMAGE }}@${{ steps.api.outputs.digest }}
          WEB_REFERENCE: ${{ env.WEB_IMAGE }}@${{ steps.web.outputs.digest }}
        run: deploy/build-release.sh "$TARGET_SHA" "$API_REFERENCE" "$WEB_REFERENCE" release-package/release.tgz

      - name: Publish immutable release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gobrewery-release-${{ needs.classify.outputs.target_sha }}
          path: release-package/release.tgz
          if-no-files-found: error
          retention-days: 90

  prepare_existing:
    name: Prepare existing immutable release
    needs: classify
    if: needs.classify.outputs.manual == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download artifact from the successful master release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.classify.outputs.target_sha }}
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/deploy-vm-ghcr.yml/runs?head_sha=$TARGET_SHA&status=success&per_page=100" \
            --jq '.workflow_runs | map(select(.conclusion == "success" and .event == "push" and .head_branch == "master")) | first | .id')"
          [[ -n "$run_id" ]] || { echo "No successful master release found for $TARGET_SHA" >&2; exit 66; }
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --name "gobrewery-release-$TARGET_SHA" --dir release-package
          test -f release-package/release.tgz

      - name: Re-publish artifact in this manual run
        uses: actions/upload-artifact@v4
        with:
          name: gobrewery-release-${{ needs.classify.outputs.target_sha }}
          path: release-package/release.tgz
          if-no-files-found: error
          retention-days: 90

  deploy:
    name: Deploy to OCI
    needs: [classify, publish, prepare_existing]
    if: ${{ always() && needs.classify.result == 'success' && (needs.publish.result == 'success' || needs.prepare_existing.result == 'success') }}
    permissions:
      actions: read
      contents: read
      packages: read
    uses: p-perotti/oracle-infra/.github/workflows/deploy.yml@51f3f07df4ba643ccca826a2c4a355ed460b3b68
    with:
      environment_name: OCI
      environment_url: https://gobrewery.duckdns.org
      artifact_name: gobrewery-release-${{ needs.classify.outputs.target_sha }}
      app_name: gobrewery
      release_id: ${{ needs.classify.outputs.target_sha }}
      services: api web
      smoke_url: https://gobrewery.duckdns.org
      operation: ${{ needs.classify.outputs.operation }}
      failure_mode: ${{ needs.classify.outputs.failure_mode }}
    secrets:
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

  record-vercel-deployment:
    name: Record Vercel deployment
    if: >-
      github.event_name == 'repository_dispatch' &&
      github.event.client_payload.environment == 'production' &&
      github.event.client_payload.git.ref == 'web-next'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Record Vercel deployment
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: payload.git.sha,
              environment: 'Vercel',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'Vercel',
              environment_url: payload.url,
            });
