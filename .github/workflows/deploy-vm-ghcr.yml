name: Build And Deploy To VM

on:
  push:
    branches:
      - master
    paths:
      - "server/**"
      - "web/**"
      - "deploy/**"
      - ".github/workflows/deploy-vm-ghcr.yml"
  workflow_dispatch:
  repository_dispatch:
    types:
      - vercel.deployment.success

permissions:
  contents: read
  deployments: write
  packages: write

jobs:
  build-and-push:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./deploy/Dockerfile.api
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/gobrewery-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/gobrewery-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./deploy/Dockerfile.web
          push: true
          platforms: linux/arm64
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository_owner }}/gobrewery-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/gobrewery-web:latest

  deploy:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: OCI
      url: https://gobrewery.duckdns.org
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,GHCR_OWNER
          script: |
            set -euo pipefail
            cd /srv/gobrewery
            git pull --ff-only origin master

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export API_IMAGE="ghcr.io/${GHCR_OWNER}/gobrewery-api:${IMAGE_TAG}"
            export WEB_IMAGE="ghcr.io/${GHCR_OWNER}/gobrewery-web:${IMAGE_TAG}"
            export COMPOSE_FILE="/srv/gobrewery/deploy/docker-compose.prod.yml"
            export HEALTH_BASE_URL="https://gobrewery.duckdns.org"

            bash deploy/deploy-images.sh
            RUN_SEED=false bash deploy/init-db.sh
            bash deploy/check-health.sh

            umask 077
            runtime_env="$(mktemp /srv/gobrewery/.env.XXXXXX)"
            printf 'API_IMAGE=%s\nWEB_IMAGE=%s\n' "$API_IMAGE" "$WEB_IMAGE" > "$runtime_env"
            mv "$runtime_env" /srv/gobrewery/.env

  record-vercel-deployment:
    if: >-
      github.event_name == 'repository_dispatch' &&
      github.event.client_payload.environment == 'production' &&
      github.event.client_payload.git.ref == 'web-next'
    runs-on: ubuntu-latest
    steps:
      - name: Record Vercel deployment
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: payload.git.sha,
              environment: 'Vercel',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'Vercel',
              environment_url: payload.url,
            });
